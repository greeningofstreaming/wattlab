# /etc/nginx/sites-available/wattlab
# WattLab — Greening of Streaming
# HTTP: redirect to HTTPS once cert is live.
# Until cert exists, comment out the return 301 line and use the proxy block directly.

# Rate limiting: 4 job submissions per minute per IP, burst of 2
limit_req_zone $binary_remote_addr zone=wattlab_submit:10m rate=4r/m;
# Max 3 simultaneous connections per IP
limit_conn_zone $binary_remote_addr zone=wattlab_conn:10m;

server {
    listen 80;
    listen [::]:80;
    server_name wattlab.greeningofstreaming.org;

    # Allow video uploads up to 2GB (FastAPI enforces 1GB; this must be >= that)
    client_max_body_size 2g;

    # ACME challenge (Let's Encrypt HTTP-01)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP → HTTPS (uncomment once cert is issued)
    # return 301 https://$host$request_uri;

    # Rate-limit job submission endpoints
    location ~ ^/(video/use-source|video/upload|llm/run|llm/run-all|image/start)$ {
        limit_req zone=wattlab_submit burst=2 nodelay;
        limit_conn wattlab_conn 3;
        limit_req_status 429;
        limit_conn_status 429;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    location / {
        limit_conn wattlab_conn 3;
        limit_conn_status 429;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}

