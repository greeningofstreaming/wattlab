# /etc/nginx/sites-available/wattlab
# WattLab — Greening of Streaming
# HTTP: redirect to HTTPS once cert is live.
# Until cert exists, comment out the return 301 line and use the proxy block directly.

server {
    listen 80;
    listen [::]:80;
    server_name wattlab.greeningofstreaming.org;

    # ACME challenge (Let's Encrypt HTTP-01)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP → HTTPS (uncomment once cert is issued)
    # return 301 https://$host$request_uri;

    # Temporary: serve via HTTP until cert is ready
    location /settings {
        return 403;
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name wattlab.greeningofstreaming.org;

    ssl_certificate     /etc/letsencrypt/live/wattlab.greeningofstreaming.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wattlab.greeningofstreaming.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Block /settings from public internet
    location /settings {
        return 403;
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}
